[build]
  publish = "_site"
  command = """npm cache clean --force && npm install --verbose 2>&1 | head -100 && npx @11ty/eleventy"""
  functions = "netlify/functions"

[build.environment]
  NPM_CONFIG_REGISTRY = "https://registry.npmmirror.com/"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
